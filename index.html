<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Clock - Trajectory Viewer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; background: #f0f0f0; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* 磨砂玻璃控制面板 (適配 OSM 明亮風格) */
        .control-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px; 
            background: rgba(255, 255, 255, 0.4); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 10px; border-radius: 50px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn {
            border: none; background: rgba(255, 255, 255, 0.3); 
            color: #5a3010; padding: 12px 24px;
            border-radius: 40px; cursor: pointer; font-weight: 600; 
            transition: all 0.3s; font-size: 14px;
        }

        .btn:hover { background: rgba(255, 255, 255, 0.6); }

        .btn.active { 
            background: #5a3010; 
            color: #f5e8c0; 
            box-shadow: 0 4px 12px rgba(90, 48, 16, 0.3);
        }

        /* 磨砂資訊卡 (適配 OSM 明亮風格) */
        .info-card {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px; border-radius: 16px; 
            font-size: 13px; color: #5a3010;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
            border: 1px solid rgba(255, 255, 255, 0.4);
            line-height: 1.6;
            pointer-events: none; /* 防止擋住地圖點擊 */
        }

        /* 動態浮水印 CSS */
        .watermark {
            position: absolute;
            bottom: 10px;
            right: 15px;
            z-index: 999; /* 僅次於控制項 */
            font-family: 'Courier New', monospace; /* 使用等寬字體更有極客感 */
            font-size: 14px;
            font-weight: bold;
            color: rgba(90, 48, 16, 0.15); /* 極淡的顏色 */
            letter-spacing: 2px;
            pointer-events: none; /* 完全不擋住地圖 */
            user-select: none; /* 防止被選取 */
            
            /* 定義呼吸動畫：3秒一次循環 */
            animation: watermark-pulse 3s infinite;
        }

        @keyframes watermark-pulse {
            0%   { opacity: 0.1; }
            50%  { opacity: 1; }
            100% { opacity: 0.1; }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <button class="btn active" onclick="updateRange(1, this)">1天</button>
    <button class="btn" onclick="updateRange(7, this)">1週</button>
    <button class="btn" onclick="updateRange(30, this)">1個月</button>
</div>

<div class="watermark">OWEN_STONE</div>

<div class="info-card" id="statusBox">
    <div>旅程狀態: <span id="sysStat">同步中...</span></div>
    <div style="font-size:11px; margin-top:5px;" id="details"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // ── CONFIG ──
    const SHEET_ID = '1fkw8lmVsxzQ0wXAFg957bwgRN6ziX3d4lUjbW6JPm_0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=定位記錄`;
    const MAX_DISPLAY_POINTS = 100; // 按鈕選擇後最多顯示的點數 (從20提升至100)
    
    let allRawPoints = [];
    let markers = [];
    
    // 初始化地圖：預設中心台北
    const map = L.map('map', { zoomControl: false }).setView([25.03, 121.5], 11);
    
    // ⚠️ 更換為 OpenStreetMap 全彩道路圖 ⚠️
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
    }).addTo(map);

    // 氣象雷達風格漸層 (藍 -> 綠 -> 黃 -> 紅)
    function getColor(index, total) {
        if (total <= 1) return '#ff3b30';
        const ratio = index / (total - 1);
        let r, g, b;
        if (ratio < 0.33) { r = 0; g = Math.floor(ratio * 3 * 255); b = 255; }
        else if (ratio < 0.66) { r = Math.floor((ratio - 0.33) * 3 * 255); g = 255; b = Math.floor((1 - (ratio - 0.33) * 3) * 255); }
        else { r = 255; g = Math.floor((1 - (ratio - 0.66) * 3) * 255); b = 0; }
        return `rgb(${r}, ${g}, ${b})`;
    }

    // 清洗數值
    function forceNum(val) {
        if (!val) return null;
        let s = val.toString().replace(/[^0-9.\-]/g, '');
        return s ? parseFloat(s) : null;
    }

    // 強化版時間解析 (保留原始邏輯)
    function parseDateSafe(str) {
        if (!str) return null;
        let s = str.toString().replace(/"/g, '');
        const isPM = s.includes('下午');
        const isAM = s.includes('上午');
        let cleanS = s.replace('上午', ' ').replace('下午', ' ');
        let d = new Date(cleanS);
        if (isNaN(d.getTime())) {
            const parts = s.split(' ');
            if (parts.length >= 1) {
                const ym = parts[0].split('/');
                if (ym.length === 3) {
                    d = new Date(ym[0], ym[1]-1, ym[2]);
                    if (parts[1]) {
                        let t = parts[1].replace('上午','').replace('下午','').split(':');
                        let h = parseInt(t[0]) || 0;
                        if (isPM && h < 12) h += 12;
                        if (isAM && h === 12) h = 0;
                        d.setHours(h, parseInt(t[1])||0, parseInt(t[2])||0);
                    }
                }
            }
        } else {
            if (isPM && d.getHours() < 12) d.setHours(d.getHours() + 12);
            if (isAM && d.getHours() === 12) d.setHours(0);
        }
        return d;
    }

    async function initData() {
        document.getElementById('sysStat').innerText = "旅程資料同步中...";
        Papa.parse(CSV_URL, {
            download: true,
            header: false,
            complete: function(results) {
                const rows = results.data.slice(1); // 跳過標題列
                allRawPoints = rows.map(row => ({
                    timeStr: (row[0] || '').toString().replace(/"/g,''),
                    lat: forceNum(row[3]), // D欄
                    lng: forceNum(row[4]), // E欄
                    timestamp: parseDateSafe(row[0]) // A欄
                }))
                .filter(p => p.lat && p.lng && p.timestamp && p.lat !== 0);

                if (allRawPoints.length === 0) {
                    document.getElementById('sysStat').innerText = "同步失敗";
                    document.getElementById('details').innerText = "原因：試算表內無有效定位數據。";
                } else {
                    allRawPoints.sort((a, b) => a.timestamp - b.timestamp);
                    document.getElementById('sysStat').innerText = "已連線";
                    updateRange(1, document.querySelector('.btn')); // 預設顯示1天
                }
            },
            error: function() {
                document.getElementById('sysStat').innerText = "連線失敗";
                document.getElementById('details').innerText = "請檢查網路或試算表共用權限。";
            }
        });
    }

    function updateRange(days, btn) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - days);

        // 1. 過濾時間範圍
        let filtered = allRawPoints.filter(p => p.timestamp >= cutoff);
        
        // 【保留原始羅輯】: 即使過濾後沒點，也要強行加入「全表最後一筆」
        if (filtered.length === 0 && allRawPoints.length > 0) {
            filtered = [allRawPoints[allRawPoints.length - 1]];
        }

        // 2. 均勻採樣 (MAX_DISPLAY_POINTS 提升至 100)
        let sampled = [];
        if (filtered.length <= MAX_DISPLAY_POINTS) {
            sampled = filtered;
        } else {
            for (let i = 0; i < MAX_DISPLAY_POINTS; i++) {
                sampled.push(filtered[Math.floor(i * (filtered.length - 1) / (MAX_DISPLAY_POINTS - 1))]);
            }
            // 確保最後一點一定是真實的最新點
            sampled[sampled.length - 1] = filtered[filtered.length - 1];
        }

        renderMap(sampled, days, filtered.length);
    }

    function renderMap(points, days, totalInRange) {
        // 清除舊標記與線條
        markers.forEach(m => map.removeLayer(m));
        markers = [];
        map.eachLayer(l => { if (l instanceof L.Polyline) map.removeLayer(l); });

        const last = points[points.length - 1];
        
        // 畫軌跡線 (至少要有兩點且座標不同)
        if (points.length > 1) {
            const hasMovement = points.some(p => p.lat !== points[0].lat || p.lng !== points[0].lng);
            if (hasMovement) {
                for (let i = 0; i < points.length - 1; i++) {
                    L.polyline([points[i], points[i+1]], {
                        color: getColor(i, points.length),
                        weight: 6, // 稍微加粗軌跡在 OSM 上更清晰
                        opacity: 0.85, 
                        lineCap: 'round',
                        lineJoin: 'round'
                    }).addTo(map);
                }
            }
        }

        // 標記最後位置 (風格微調適配 OSM)
        const endMkr = L.circleMarker([last.lat, last.lng], {
            radius: 9, 
            color: '#ffffff', // 白色外圈
            fillColor: '#ee3322', // 鮮紅色填充
            fillOpacity: 1, 
            weight: 3,
            className: 'last-point-marker'
        }).addTo(map);
        
        // 預設開啟彈出視窗
        endMkr.bindPopup(`<b>最新位置</b><br>${last.timeStr}`).openPopup();
        markers.push(endMkr);

        // 如果只有一個點或定點停留
        if (points.length === 1 || points.every(p => p.lat === points[0].lat)) {
            map.setView([last.lat, last.lng], 17);
        } else {
            // 自動縮放至軌跡範圍
            const bounds = L.latLngBounds(points.map(p => [p.lat, p.lng]));
            map.fitBounds(bounds, {padding: [60, 60]});
        }

        // 更新資訊卡
        document.getElementById('details').innerHTML = 
            `更新：${last.timeStr.split(' ')[1] || last.timeStr}<br>` +
            `範圍點數：${totalInRange} | 顯示：${points.length} 點<br>` +
            `模式：最近 ${days} 天`;
    }

    // 啟動程式
    initData();
</script>
</body>
</html>
