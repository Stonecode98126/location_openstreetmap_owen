<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spirit Clock - Trajectory with Duration</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'PingFang TC', sans-serif; background: #f0f0f0; }
        #map { height: 100%; width: 100%; z-index: 1; }
        
        /* 控制面板 */
        .control-panel {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: flex; gap: 8px; 
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px); padding: 10px; border-radius: 50px; 
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .btn {
            border: none; background: rgba(255, 255, 255, 0.3); color: #5a3010; 
            padding: 10px 20px; border-radius: 40px; cursor: pointer; font-weight: 600; font-size: 14px;
        }
        .btn.active { background: #5a3010; color: #f5e8c0; }

        /* 停留時間標籤樣式 (高對比黃底) */
        .duration-label {
            background: rgba(255, 235, 59, 0.95); /* 亮黃色背景 */
            backdrop-filter: blur(2px);
            padding: 2px 6px;
            border-radius: 4px;
            border: 1px solid rgba(139, 90, 43, 0.5);
            font-size: 11px; /* 稍微放大一點點以配合粗體 */
            font-weight: 800; /* 加粗字體防干擾 */
            color: #3e200b; /* 深咖啡色文字 */
            white-space: nowrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.25);
            pointer-events: none;
        }

        /* 資訊卡 */
        .info-card {
            position: absolute; bottom: 30px; left: 20px; z-index: 1000;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(10px);
            padding: 15px; border-radius: 16px; font-size: 13px; color: #5a3010;
            border: 1px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }

        /* 動態浮水印 (放大、加粗、提高、變慢) */
        .watermark {
            position: absolute; bottom: 40px; right: 20px; z-index: 999;
            font-family: 'Courier New', monospace; 
            font-size: 28px; /* 放大一倍 */
            font-weight: 900; /* 最粗體 */
            color: rgba(90, 48, 16, 0.15); letter-spacing: 2px;
            pointer-events: none; user-select: none;
            animation: watermark-pulse 6s infinite; /* 呼吸時間延長一倍至 6 秒 */
        }
        @keyframes watermark-pulse {
            0% { opacity: 0.05; } 50% { opacity: 0.9; } 100% { opacity: 0.05; }
        }
    </style>
</head>
<body>

<div class="control-panel">
    <button class="btn active" onclick="updateRange(1, this)">1天</button>
    <button class="btn" onclick="updateRange(7, this)">1週</button>
    <button class="btn" onclick="updateRange(30, this)">1個月</button>
</div>

<div class="watermark">OWEN_STONE</div>

<div class="info-card" id="statusBox">
    <div>旅程狀態: <span id="sysStat">同步中...</span></div>
    <div style="font-size:11px; margin-top:5px;" id="details"></div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    const SHEET_ID = '1fkw8lmVsxzQ0wXAFg957bwgRN6ziX3d4lUjbW6JPm_0';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=定位記錄`;
    const MAX_DISPLAY_POINTS = 100;
    
    let allRawPoints = [];
    let markers = [];
    let durationLabels = [];

    const map = L.map('map', { zoomControl: false }).setView([25.03, 121.5], 11);
    
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OSM'
    }).addTo(map);

    function getColor(index, total) {
        if (total <= 1) return '#ee3322';
        const ratio = index / (total - 1);
        let r, g, b;
        if (ratio < 0.33) { r = 0; g = Math.floor(ratio * 3 * 255); b = 255; }
        else if (ratio < 0.66) { r = Math.floor((ratio - 0.33) * 3 * 255); g = 255; b = Math.floor((1 - (ratio - 0.33) * 3) * 255); }
        else { r = 255; g = Math.floor((1 - (ratio - 0.66) * 3) * 255); b = 0; }
        return `rgb(${r}, ${g}, ${b})`;
    }

    function forceNum(val) {
        if (!val) return null;
        let s = val.toString().replace(/[^0-9.\-]/g, '');
        return s ? parseFloat(s) : null;
    }

    function parseDateSafe(str) {
        if (!str) return null;
        let s = str.toString().replace(/"/g, '');
        const isPM = s.includes('下午');
        const isAM = s.includes('上午');
        let cleanS = s.replace('上午', ' ').replace('下午', ' ');
        let d = new Date(cleanS);
        if (isNaN(d.getTime())) {
            const parts = s.split(' ');
            if (parts.length >= 1) {
                const ym = parts[0].split('/');
                if (ym.length === 3) {
                    d = new Date(ym[0], ym[1]-1, ym[2]);
                    if (parts[1]) {
                        let t = parts[1].replace('上午','').replace('下午','').split(':');
                        let h = parseInt(t[0]) || 0;
                        if (isPM && h < 12) h += 12;
                        if (isAM && h === 12) h = 0;
                        d.setHours(h, parseInt(t[1])||0, parseInt(t[2])||0);
                    }
                }
            }
        } else {
            if (isPM && d.getHours() < 12) d.setHours(d.getHours() + 12);
            if (isAM && d.getHours() === 12) d.setHours(0);
        }
        return d;
    }

    async function initData() {
        Papa.parse(CSV_URL, {
            download: true, header: false,
            complete: function(results) {
                const rows = results.data.slice(1);
                allRawPoints = rows.map(row => ({
                    timeStr: (row[0] || '').toString().replace(/"/g,''),
                    lat: forceNum(row[3]),
                    lng: forceNum(row[4]),
                    timestamp: parseDateSafe(row[0]),
                    duration: (row[9] || '').toString().replace(/"/g,'').trim()
                }))
                .filter(p => p.lat && p.lng && p.timestamp && p.lat !== 0);

                if (allRawPoints.length > 0) {
                    allRawPoints.sort((a, b) => a.timestamp - b.timestamp);
                    document.getElementById('sysStat').innerText = "已連線";
                    updateRange(1, document.querySelector('.btn'));
                }
            }
        });
    }

    function updateRange(days, btn) {
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const cutoff = new Date();
        cutoff.setDate(cutoff.getDate() - days);

        let filtered = allRawPoints.filter(p => p.timestamp >= cutoff);
        if (filtered.length === 0 && allRawPoints.length > 0) {
            filtered = [allRawPoints[allRawPoints.length - 1]];
        }

        let sampled = [];
        if (filtered.length <= MAX_DISPLAY_POINTS) {
            sampled = filtered;
        } else {
            for (let i = 0; i < MAX_DISPLAY_POINTS; i++) {
                sampled.push(filtered[Math.floor(i * (filtered.length - 1) / (MAX_DISPLAY_POINTS - 1))]);
            }
            sampled[sampled.length - 1] = filtered[filtered.length - 1];
        }

        renderMap(sampled, days, filtered.length);
    }

    function renderMap(points, days, totalInRange) {
        markers.forEach(m => map.removeLayer(m));
        durationLabels.forEach(l => map.removeLayer(l));
        markers = [];
        durationLabels = [];
        map.eachLayer(l => { if (l instanceof L.Polyline) map.removeLayer(l); });

        const last = points[points.length - 1];
        
        if (points.length > 1) {
            for (let i = 0; i < points.length - 1; i++) {
                const p = points[i];
                L.polyline([points[i], points[i+1]], {
                    color: getColor(i, points.length),
                    weight: 5, opacity: 0.7, lineCap: 'round'
                }).addTo(map);

                // 標註停留時間 (使用高對比黃色標籤)
                if (p.duration && p.duration !== "") {
                    const label = L.marker([p.lat, p.lng], {
                        icon: L.divIcon({
                            className: 'duration-label',
                            html: p.duration,
                            iconSize: [0, 0],
                            iconAnchor: [-5, -5] 
                        })
                    }).addTo(map);
                    durationLabels.push(label);
                }
            }
        }

        const endMkr = L.circleMarker([last.lat, last.lng], {
            radius: 8, color: '#fff', fillColor: '#ee3322', fillOpacity: 1, weight: 2
        }).addTo(map);
        endMkr.bindPopup(`<b>最後更新</b><br>${last.timeStr}<br>停留: ${last.duration || '記錄中'}`).openPopup();
        markers.push(endMkr);

        if (points.length === 1 || points.every(p => p.lat === points[0].lat)) {
            map.setView([last.lat, last.lng], 17);
        } else {
            map.fitBounds(L.latLngBounds(points.map(p => [p.lat, p.lng])), {padding: [60, 60]});
        }

        document.getElementById('details').innerHTML = 
            `更新：${last.timeStr.split(' ')[1] || last.timeStr}<br>` +
            `顯示：${points.length} 點 | 模式：最近 ${days} 天`;
    }

    initData();
</script>
</body>
</html>
